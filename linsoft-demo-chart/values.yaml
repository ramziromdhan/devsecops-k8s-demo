replicaCount: 2

image:
  repository: devsecops-k8s-demo
  tag: "latest"
  pullPolicy: IfNotPresent   # sera overridé par --set dans le pipeline

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false             # désactivé par défaut, pas d'ingress dans le runner

config:
  appVersion: "1.0.0"
  logLevel: "info"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"