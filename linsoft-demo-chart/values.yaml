# Nombre de réplicas
replicaCount: 2

# Image Docker
image:
  repository: localhost:5000/linsoft-demo
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# Service
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Ingress
ingress:
  enabled: true
  host: linsoft-demo.local

# Variables d'environnement de l'app
config:
  appVersion: "1.0.0"
  logLevel: "info"

# Limites de ressources
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"